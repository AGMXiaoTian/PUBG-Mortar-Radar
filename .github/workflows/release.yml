name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd script
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build 迫击炮测距工具.exe
        run: |
          cd script
          pyinstaller --onefile --console --name "迫击炮测距工具" radar_scanner.py

      - name: Build 调试工具.exe
        run: |
          cd script
          pyinstaller --onefile --windowed --name "调试工具" ui_config_tool.py

      - name: Prepare release package
        run: |
          mkdir release
          copy script\dist\迫击炮测距工具.exe release\
          copy script\dist\调试工具.exe release\
          copy script\config.example.json release\

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PUBG 迫击炮标点测距工具 ${{ github.ref_name }}"
          files: release/*
          generate_release_notes: true
